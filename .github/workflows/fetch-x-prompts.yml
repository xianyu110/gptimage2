name: Fetch X Prompts Daily

on:
  schedule:
    # UTC 01:10 = Beijing 09:10
    - cron: "10 1 * * *"
  workflow_dispatch:

env:
  # Opt in early to avoid Node 20 runtime deprecation issues.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: fetch-x-prompts
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Preflight secrets check
        env:
          APIPRO_API_KEY: ${{ secrets.APIPRO_API_KEY }}
        run: |
          if [ -z "${APIPRO_API_KEY}" ]; then
            echo "Missing required repository secret: APIPRO_API_KEY"
            exit 1
          fi

      - name: Fetch latest prompts from X
        env:
          APIPRO_API_KEY: ${{ secrets.APIPRO_API_KEY }}
          APIPRO_BASE_URL: http://apipro.maynor1024.live/v1
          APIPRO_MODEL: grok-4-20-non-reasoning
          APIPRO_FALLBACK_MODELS: "grok-4.1-fast, grok-4.1"
          # Optional model fallback list, comma separated:
          # APIPRO_FALLBACK_MODELS: "grok-4.1, gpt-4o-mini"
          APIPRO_MAX_RETRIES: "4"
          APIPRO_RETRY_SECONDS: "5"
          APIPRO_TIMEOUT_SECONDS: "60"
          APIPRO_LOOKBACK_HOURS: "12"
          APIPRO_MAX_ITEMS: "30"
          APIPRO_MIN_VIEWS: "1000"
          APIPRO_MIN_RETWEETS: "20"
          # Optional overrides:
          # APIPRO_QUERY: '(gptimage2 OR gpt-image-2) (prompt OR 提示词)'
          # APIPRO_LOOKBACK_HOURS: '24'
          # APIPRO_MAX_ITEMS: '60'
          APIPRO_OUTPUT_FILE: data/latest-prompts.json
        run: |
          echo "APIPRO_MODEL=${APIPRO_MODEL}"
          echo "APIPRO_FALLBACK_MODELS=${APIPRO_FALLBACK_MODELS}"
          python scripts/fetch_x_prompts.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- data/latest-prompts.json; then
            echo "No data changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest-prompts.json
          git commit -m "chore(data): refresh X prompts ($(date -u +'%Y-%m-%d'))"
          git push
