name: Fetch X Prompts Daily

on:
  schedule:
    # Retry hourly at minute 10 (UTC). If one run succeeds today (Asia/Shanghai),
    # later scheduled runs will auto-skip.
    - cron: "10 * * * *"
  workflow_dispatch:

env:
  # Opt in early to avoid Node 20 runtime deprecation issues.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  actions: read

concurrency:
  group: fetch-x-prompts
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Skip if today's scheduled run already succeeded
        id: gate
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          GH_RUN_ID: ${{ github.run_id }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          from datetime import datetime
          from urllib import request
          from zoneinfo import ZoneInfo

          repo = os.environ["GH_REPO"]
          run_id = int(os.environ["GH_RUN_ID"])
          token = os.environ["GH_TOKEN"]
          tz = ZoneInfo("Asia/Shanghai")
          today_local = datetime.now(tz).date()
          out = os.environ["GITHUB_OUTPUT"]

          url = f"https://api.github.com/repos/{repo}/actions/workflows/fetch-x-prompts.yml/runs?event=schedule&status=completed&per_page=100"
          req = request.Request(
              url,
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "User-Agent": "awesome-gptimage2-ci-gate/1.0",
              },
          )

          try:
              with request.urlopen(req, timeout=30) as resp:
                  payload = json.loads(resp.read().decode("utf-8"))
          except Exception as exc:
              print(f"Gate check failed, continue run: {exc}")
              with open(out, "a", encoding="utf-8") as f:
                  f.write("should_run=true\n")
              sys.exit(0)

          for run in payload.get("workflow_runs", []):
              if run.get("id") == run_id:
                  continue
              if run.get("conclusion") != "success":
                  continue

              started_at = run.get("run_started_at") or run.get("created_at")
              if not started_at:
                  continue

              dt = datetime.fromisoformat(started_at.replace("Z", "+00:00")).astimezone(tz)
              if dt.date() == today_local:
                  print(
                      "Today's scheduled run already succeeded; "
                      "skip this retry run."
                  )
                  with open(out, "a", encoding="utf-8") as f:
                      f.write("should_run=false\n")
                  sys.exit(0)

          print("No successful scheduled run yet today; continue.")
          with open(out, "a", encoding="utf-8") as f:
              f.write("should_run=true\n")
          PY

      - name: Preflight secrets check
        if: github.event_name != 'schedule' || steps.gate.outputs.should_run == 'true'
        env:
          APIPRO_API_KEY: ${{ secrets.APIPRO_API_KEY }}
        run: |
          if [ -z "${APIPRO_API_KEY}" ]; then
            echo "Missing required repository secret: APIPRO_API_KEY"
            exit 1
          fi

      - name: Fetch latest prompts from X
        if: github.event_name != 'schedule' || steps.gate.outputs.should_run == 'true'
        env:
          APIPRO_API_KEY: ${{ secrets.APIPRO_API_KEY }}
          APIPRO_BASE_URL: http://apipro.maynor1024.live/v1
          APIPRO_MODEL: grok-4-20-non-reasoning
          APIPRO_FALLBACK_MODELS: "grok-4.1-fast, grok-4.1, grok-4, grok-3"
          # Optional model fallback list, comma separated:
          # APIPRO_FALLBACK_MODELS: "grok-4.1-fast, grok-4.1, grok-4, grok-3"
          APIPRO_MAX_RETRIES: "4"
          APIPRO_RETRY_SECONDS: "5"
          APIPRO_TIMEOUT_SECONDS: "60"
          APIPRO_LOOKBACK_HOURS: "168"
          APIPRO_MAX_ITEMS: "120"
          APIPRO_MIN_VIEWS: "0"
          APIPRO_MIN_RETWEETS: "0"
          APIPRO_HISTORY_MAX_ITEMS: "360"
          APIPRO_QUERY: '(gptimage2 OR gpt-image-2 OR "gpt image 2" OR "gpt image 2.0" OR "gpt-image-2.0" OR "chatgpt image 2" OR "chatgpt images 2.0" OR "GPT Image 2" OR "Images 2.0") (prompt OR prompts OR 提示词 OR "Prompt-" OR "prompt:" OR "made with")'
          # Optional overrides:
          # APIPRO_LOOKBACK_HOURS: '48'
          # APIPRO_MAX_ITEMS: '60'
          APIPRO_OUTPUT_FILE: data/latest-prompts.json
        run: |
          echo "APIPRO_MODEL=${APIPRO_MODEL}"
          echo "APIPRO_FALLBACK_MODELS=${APIPRO_FALLBACK_MODELS}"
          python scripts/fetch_x_prompts.py

      - name: Commit and push if changed
        if: github.event_name != 'schedule' || steps.gate.outputs.should_run == 'true'
        run: |
          if git diff --quiet -- data/latest-prompts.json; then
            echo "No data changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest-prompts.json
          git commit -m "chore(data): refresh X prompts ($(date -u +'%Y-%m-%d'))"
          git push
