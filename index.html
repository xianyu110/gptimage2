<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awesome GPT-Image-2 - 提示词完全教程</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3Ctext%20y='.9em'%20font-size='90'%3E%F0%9F%96%BC%EF%B8%8F%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="pixel-border">
    <header class="hero">
        <div class="pixel-stars"></div>
        <div class="hero-content">
            <div class="pixel-logo">
                <span class="logo-icon">&#x1F4F7;</span>
            </div>
            <h1 class="pixel-title">AWESOME<br>GPT-IMAGE-2</h1>
            <p class="subtitle">GPT-Image-2 提示词完全教程</p>
            <div class="badge-row">
                <span class="badge badge-green">30+ 提示词</span>
                <span class="badge badge-blue">10 大场景</span>
                <span class="badge badge-purple">6 篇实测</span>
            </div>
            <div class="stats-bar">
                <div class="stat">
                    <span class="stat-num">240+</span>
                    <span class="stat-label">Arena 领先分</span>
                </div>
                <div class="stat">
                    <span class="stat-num">8</span>
                    <span class="stat-label">单次最多图</span>
                </div>
                <div class="stat">
                    <span class="stat-num">2K</span>
                    <span class="stat-label">最大分辨率</span>
                </div>
                <div class="stat">
                    <span class="stat-num">3s</span>
                    <span class="stat-label">生成速度</span>
                </div>
            </div>
        </div>
    </header>

    <nav class="pixel-nav">
        <div class="nav-inner">
            <a href="#readme" class="nav-btn">README</a>
            <a href="https://github.com/xianyu110/awesome-gptimage2" class="nav-btn nav-btn-github" target="_blank">GitHub</a>
        </div>
    </nav>

    <main class="content">
        <section id="readme" class="section">
            <h2 class="section-title"><span class="pixel-icon">&#x1F4D6;</span> README</h2>
            <div class="card readme-card">
                <div class="readme-meta">
                    <span class="readme-status" id="readme-status">正在加载 README.md…</span>
                    <a class="readme-link" href="README.md" target="_blank" rel="noreferrer">打开原始 README</a>
                </div>
                <article id="readme-content" class="markdown-body" aria-live="polite"></article>
            </div>
        </section>

    </main>

    <footer class="pixel-footer">
        <p>Made with GPT-Image-2 | Last updated: 2026-04-22</p>
        <p>内容整合自 6 篇深度实测文章 | 请负责任地使用 AI 图像生成工具</p>
    </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
<script>
// Smooth scroll for nav
document.querySelectorAll('a[href^="#"]').forEach(anchor => {
    anchor.addEventListener('click', function(e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if (target) {
            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    });
});

function absolutizeLinksAndMakeExternal(containerEl) {
    containerEl.querySelectorAll('a[href]').forEach(a => {
        const href = a.getAttribute('href') || '';
        if (!href) return;
        if (href.startsWith('#')) return;
        a.target = '_blank';
        a.rel = 'noreferrer';
    });
}

function addLazyLoadingToImages(containerEl) {
    containerEl.querySelectorAll('img').forEach(img => {
        img.loading = 'lazy';
        img.decoding = 'async';
        img.referrerPolicy = 'no-referrer';
    });
}

async function loadReadme() {
    const statusEl = document.getElementById('readme-status');
    const contentEl = document.getElementById('readme-content');

    try {
        if (!window.marked) throw new Error('marked.js 加载失败');
        if (!window.DOMPurify) throw new Error('DOMPurify 加载失败');
        marked.setOptions({ gfm: true, breaks: true });

        const res = await fetch('README.md', { cache: 'no-store' });
        if (!res.ok) throw new Error('README.md 读取失败：' + res.status);
        const md = await res.text();
        const html = marked.parse(md);
        const safeHtml = DOMPurify.sanitize(html, { USE_PROFILES: { html: true } });
        contentEl.innerHTML = safeHtml;

        absolutizeLinksAndMakeExternal(contentEl);
        addLazyLoadingToImages(contentEl);
        statusEl.textContent = '已加载 README.md（网页内容自动与仓库同步）';
    } catch (err) {
        statusEl.textContent = '加载失败：' + (err && err.message ? err.message : String(err));
        contentEl.textContent = 'README 渲染失败。请点击上方“打开原始 README”。';
    }
}

loadReadme();
</script>

</body>
</html>
